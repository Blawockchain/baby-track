<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRACKR — Visual Tracking Effects</title>
<meta name="description" content="TRACKR — Real-time visual tracking effects tool">
<style>
/* ── Reset & Base ─────────────────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%; overflow: hidden;
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  font-size: 13px;
}
body.dark { background: #0a0a0a; color: #e0e0e0; }
body.light { background: #f0f0f0; color: #1a1a1a; }

/* ── App Layout ───────────────────────────────────────────────────────── */
#app { display: flex; height: 100vh; width: 100vw; }

/* ── Sidebar ──────────────────────────────────────────────────────────── */
#sidebar {
  width: 280px; min-width: 280px; max-width: 280px; height: 100vh;
  overflow-y: auto; overflow-x: hidden;
  display: flex; flex-direction: column;
  z-index: 10;
}
body.dark #sidebar { background: #0e0e0e; border-right: 1px solid #1a1a1a; }
body.light #sidebar { background: #e8e8e8; border-right: 1px solid #ccc; }
#sidebar::-webkit-scrollbar { width: 4px; }
#sidebar::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

/* ── Sidebar Header ───────────────────────────────────────────────────── */
.sidebar-header { padding: 10px 12px 0 12px; display: flex; flex-direction: column; gap: 6px; }
.logo-row { display: flex; align-items: center; justify-content: space-between; }
.logo {
  font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
  font-size: 15px; font-weight: 700;
  letter-spacing: 3px;
}
body.dark .logo { color: #fff; }
body.light .logo { color: #111; }

/* ── Controls ─────────────────────────────────────────────────────────── */
.controls { padding: 8px 12px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
.section { display: flex; flex-direction: column; gap: 4px; }
.section-label {
  font-size: 10px; font-weight: 600;
  letter-spacing: 1.5px; text-transform: uppercase;
  padding-bottom: 2px;
  margin-bottom: 1px;
}
body.dark .section-label { color: #444; border-bottom: 1px solid #181818; }
body.light .section-label { color: #aaa; border-bottom: 1px solid #d0d0d0; }

.btn-row { display: flex; gap: 3px; flex-wrap: wrap; align-items: center; }
.btn {
  padding: 4px 8px; border: none; border-radius: 3px;
  font-size: 10px; font-weight: 600; cursor: pointer;
  transition: all 0.15s; font-family: inherit;
}
body.dark .btn { background: #1a1a1a; color: #ccc; }
body.light .btn { background: #d5d5d5; color: #333; }
.btn:hover { opacity: 0.85; }
.btn.active { background: #4a4aff; color: #fff; }
.btn.primary { background: #3a3aee; color: #fff; }
.btn.primary:hover { background: #5050ff; }
.btn.danger { background: #cc3333; color: #fff; }

.row-label { font-size: 10px; color: #666; margin-right: 3px; white-space: nowrap; }

input[type="range"] { width: 100%; accent-color: #4a4aff; }
input[type="color"] {
  width: 30px; height: 22px; border: none;
  border-radius: 3px; cursor: pointer; background: none;
}
input[type="text"].field {
  padding: 3px 6px; border-radius: 3px; font-size: 11px;
  font-family: inherit; width: 100%;
}
body.dark input[type="text"].field { background: #1a1a1a; color: #ccc; border: 1px solid #333; }
body.light input[type="text"].field { background: #ddd; color: #333; border: 1px solid #bbb; }

.toggle-row {
  display: flex; align-items: center; gap: 6px; font-size: 10px;
}
.toggle-row input[type="checkbox"] { accent-color: #4a4aff; }

select {
  padding: 3px 6px; border-radius: 3px; font-size: 10px;
  font-family: inherit; cursor: pointer;
}
body.dark select { background: #1a1a1a; color: #ccc; border: 1px solid #333; }
body.light select { background: #ddd; color: #333; border: 1px solid #bbb; }

.slider-row {
  display: flex; align-items: center; gap: 6px; font-size: 10px;
}
.slider-row input[type="range"] { flex: 1; }
.slider-row .slider-val { min-width: 28px; text-align: right; color: #888; font-size: 10px; }

/* ── Main Area ────────────────────────────────────────────────────────── */
#main {
  flex: 1; display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
body.dark #main { background: #050505; }
body.light #main { background: #e0e0e0; }

#display-canvas {
  max-width: 100%; max-height: 100%;
  display: block;
}
#placeholder {
  text-align: center; color: #444; font-size: 14px;
}
#placeholder h2 {
  font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
  font-size: 18px; margin-bottom: 8px; color: #666;
  letter-spacing: 3px;
}

/* Hidden elements */
.hidden { display: none !important; }
video, #offscreen, #filterCanvas { display: none; }
</style>
</head>
<body class="dark">
<div id="app">
<!-- ── Sidebar ──────────────────────────────────────────────────────── -->
<div id="sidebar">
  <div class="sidebar-header">
    <div class="logo-row">
      <span class="logo">TRACKR</span>
      <button class="btn" onclick="toggleTheme()" style="font-size:10px;">Theme</button>
    </div>
  </div>

  <div class="controls">
    <!-- VIDEO -->
    <div class="section">
      <div class="section-label">Video</div>
      <div class="btn-row">
        <button class="btn primary" onclick="uploadVideo()">Upload</button>
        <button class="btn primary" onclick="openCamera()">Camera</button>
      </div>
      <div class="btn-row">
        <span class="row-label">Speed:</span>
        <button class="btn active" onclick="setSpeed(1,this)">1x</button>
        <button class="btn" onclick="setSpeed(2,this)">2x</button>
        <button class="btn" onclick="setSpeed(3,this)">3x</button>
        <button class="btn" onclick="setSpeed(4,this)">4x</button>
      </div>
      <div class="slider-row">
        <span class="row-label">Skip:</span>
        <input type="range" id="perfSlider" min="0" max="4" value="0"
          oninput="state.frameSkip=+this.value; this.nextElementSibling.textContent=this.value==0?'0':this.value">
        <span class="slider-val">0</span>
      </div>
    </div>

    <!-- TRACKING -->
    <div class="section">
      <div class="section-label">Tracking</div>
      <div class="slider-row">
        <span class="row-label">Min Size:</span>
        <input type="range" id="minSizeSlider" min="200" max="5000" value="1200"
          oninput="state.minBlobArea=+this.value; this.nextElementSibling.textContent=this.value">
        <span class="slider-val">1200</span>
      </div>
      <div class="btn-row">
        <span class="row-label">Max:</span>
        <button class="btn" onclick="setMaxBlobs(3,this)">3</button>
        <button class="btn active" onclick="setMaxBlobs(8,this)">8</button>
        <button class="btn" onclick="setMaxBlobs(15,this)">15</button>
        <button class="btn" onclick="setMaxBlobs(30,this)">30</button>
      </div>
      <div class="toggle-row">
        <input type="checkbox" id="singleTrack" onchange="state.singleTracking=this.checked">
        <label for="singleTrack">Single Tracking</label>
      </div>
      <div class="toggle-row">
        <input type="checkbox" id="sameSize" onchange="state.sameSize=this.checked">
        <label for="sameSize">Same Size</label>
      </div>
    </div>

    <!-- AUDIO -->
    <div class="section">
      <div class="section-label">Audio</div>
      <div class="btn-row">
        <span class="row-label">Sound:</span>
        <button class="btn active" onclick="setAudio('none',this)">None</button>
        <button class="btn" onclick="setAudio('beep',this)">Beep</button>
        <button class="btn" onclick="setAudio('bird',this)">Bird</button>
      </div>
    </div>

    <!-- DISPLAY -->
    <div class="section">
      <div class="section-label">Display</div>
      <div class="btn-row">
        <span class="row-label">Shape:</span>
        <button class="btn active" onclick="setShape('square',this)">&#9633;</button>
        <button class="btn" onclick="setShape('circle',this)">&#9675;</button>
        <button class="btn" onclick="setShape('rounded',this)">&#9645;</button>
      </div>
      <div class="btn-row">
        <span class="row-label">Region:</span>
        <select id="regionSelect" onchange="state.region=this.value">
          <option value="box">Box</option>
          <option value="fill">Fill</option>
          <option value="outline">Outline</option>
        </select>
      </div>
      <div class="btn-row">
        <input type="color" id="colorPicker" value="#00ff88" onchange="state.color=this.value">
        <div class="toggle-row">
          <input type="checkbox" id="sepColors" onchange="state.separateColors=this.checked">
          <label for="sepColors">Separate</label>
        </div>
        <div class="toggle-row">
          <input type="checkbox" id="crazyColors" onchange="state.crazy=this.checked">
          <label for="crazyColors">Crazy</label>
        </div>
      </div>
      <div class="toggle-row">
        <input type="checkbox" id="textToggle" onchange="state.showText=this.checked">
        <label for="textToggle">Text</label>
      </div>
      <div style="display:flex;flex-direction:column;gap:3px;">
        <span class="row-label">Label:</span>
        <input type="text" class="field" id="labelField" placeholder="(empty = no label)" oninput="state.labelText=this.value">
      </div>
      <div class="btn-row">
        <span class="row-label">Font:</span>
        <button class="btn" onclick="setFont(10,this)">10</button>
        <button class="btn active" onclick="setFont(12,this)">12</button>
        <button class="btn" onclick="setFont(16,this)">16</button>
        <button class="btn" onclick="setFont(20,this)">20</button>
      </div>
      <div class="btn-row">
        <span class="row-label">Pos:</span>
        <select id="textPos" onchange="state.textPosition=this.value">
          <option value="center">Center</option>
          <option value="top">Top</option>
          <option value="bottom">Bottom</option>
        </select>
      </div>
    </div>

    <!-- EFFECTS -->
    <div class="section">
      <div class="section-label">Effects</div>
      <div class="btn-row">
        <button class="btn active" onclick="setEffect('basic',this)">Basic</button>
        <button class="btn" onclick="setEffect('label',this)">Label</button>
        <button class="btn" onclick="setEffect('frame',this)">Frame</button>
        <button class="btn" onclick="setEffect('lframe',this)">L-Frame</button>
        <button class="btn" onclick="setEffect('xframe',this)">X-Frame</button>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="setEffect('grid',this)">Grid</button>
        <button class="btn" onclick="setEffect('particle',this)">Particle</button>
        <button class="btn" onclick="setEffect('dash',this)">Dash</button>
        <button class="btn" onclick="setEffect('scope',this)">Scope</button>
        <button class="btn" onclick="setEffect('glow',this)">Glow</button>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="setEffect('backdrop',this)">Backdrop</button>
        <button class="btn" onclick="setEffect('win2k',this)">Win2K</button>
        <button class="btn" onclick="setEffect('label2',this)">Label2</button>
      </div>

      <div class="btn-row" style="margin-top:4px;">
        <span class="row-label">Filters:</span>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="toggleFilter('invert',this)">Invert</button>
        <button class="btn" onclick="toggleFilter('fusion',this)">Fusion</button>
        <button class="btn" onclick="toggleFilter('glitch',this)">Glitch</button>
        <button class="btn" onclick="toggleFilter('thermal',this)">Thermal</button>
        <button class="btn" onclick="toggleFilter('pixel',this)">Pixel</button>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="toggleFilter('tone',this)">Tone</button>
        <button class="btn" onclick="toggleFilter('blur',this)">Blur</button>
        <button class="btn" onclick="toggleFilter('dither',this)">Dither</button>
        <button class="btn" onclick="toggleFilter('zoom',this)">Zoom</button>
        <button class="btn" onclick="toggleFilter('xray',this)">X-Ray</button>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="toggleFilter('water',this)">Water</button>
        <button class="btn" onclick="toggleFilter('mask',this)">Mask</button>
        <button class="btn" onclick="toggleFilter('crt',this)">CRT</button>
        <button class="btn" onclick="toggleFilter('edge',this)">Edge</button>
        <button class="btn" onclick="toggleFilter('blink',this)">Blink</button>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="toggleFilter('inv',this)">Inv</button>
      </div>

      <div class="btn-row" style="margin-top:4px;">
        <span class="row-label">Connect:</span>
        <button class="btn active" id="connOff" onclick="setConn('off',this)">Off</button>
        <button class="btn" id="connMesh" onclick="setConn('mesh',this)">Mesh</button>
        <button class="btn" id="connHub" onclick="setConn('hub',this)">Hub</button>
      </div>
      <div class="btn-row">
        <span class="row-label">Line:</span>
        <button class="btn active" onclick="state.connDash=false;activate(this)">Solid</button>
        <button class="btn" onclick="state.connDash=true;activate(this)">Dashed</button>
        <span class="row-label" style="margin-left:4px;">W:</span>
        <button class="btn active" onclick="state.connWidth=1;activate(this)">1</button>
        <button class="btn" onclick="state.connWidth=2;activate(this)">2</button>
        <button class="btn" onclick="state.connWidth=3;activate(this)">3</button>
      </div>
      <div class="slider-row">
        <span class="row-label">Rate:</span>
        <input type="range" min="0" max="100" value="50"
          oninput="state.connRate=this.value/100; this.nextElementSibling.textContent=(this.value/100).toFixed(2)">
        <span class="slider-val">0.50</span>
      </div>
    </div>

    <!-- EXPORT -->
    <div class="section">
      <div class="section-label">Export</div>
      <div class="btn-row">
        <button class="btn primary" onclick="exportVideo('mp4')">MP4</button>
        <button class="btn primary" onclick="exportVideo('webm')">WebM</button>
        <div class="toggle-row" style="margin-left:4px;">
          <input type="checkbox" id="hqExport"><label for="hqExport">HQ</label>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── Main Area ────────────────────────────────────────────────────── -->
<div id="main">
  <div id="placeholder">
    <h2>TRACKR</h2>
    <p>Upload a video or open camera to start tracking</p>
  </div>
  <canvas id="display-canvas" class="hidden"></canvas>
</div>
</div>

<!-- Hidden elements -->
<video id="video" muted></video>
<canvas id="offscreen"></canvas>
<canvas id="filterCanvas"></canvas>
<input type="file" id="videoInput" accept="video/*" class="hidden">

<script>
/* ═══════════════════════════════════════════════════════════════════════
   TRACKR — Visual Tracking Effects Tool
   Zero-dependency, single-file implementation
   ═══════════════════════════════════════════════════════════════════════ */

// ── Global State ──────────────────────────────────────────────────────
const state = {
  // Source
  source: null,
  playing: false,
  speed: 1,
  frameSkip: 0,
  frameCount: 0,

  // Blob detection
  threshold: 128,
  minBlobArea: 1200,   // min area in detection-canvas px²
  sameSize: false,
  maxBlobs: 8,

  // Shape / Region
  shape: 'square',
  region: 'box',

  // Effect
  effect: 'basic',
  filters: new Set(),

  // Connection
  connMode: 'off',
  connDash: false,
  connRate: 0.5,
  connWidth: 1,

  // Color / Text
  color: '#00ff88',
  separateColors: false,
  crazy: false,
  labelText: '',
  textPosition: 'center',
  fontSize: 12,

  // Export
  hqExport: false,
  recorder: null,
  recording: false,

  // Audio
  audioMode: 'none',
  singleTracking: false,

  // Text
  showText: false,

  // Internal tracking
  blobs: [],
  smoothBlobs: [],
  particlePhase: 0,
};

// ── Color palette for separate colors ─────────────────────────────────
const PALETTE = [
  '#00ff88', '#ff4488', '#44aaff', '#ffaa00', '#aa44ff',
  '#00ffff', '#ff6644', '#88ff44', '#ff44ff', '#44ffaa',
  '#ffff44', '#4488ff', '#ff8844', '#44ff88', '#ff4444',
  '#8844ff'
];

// ── DOM References ────────────────────────────────────────────────────
const video = document.getElementById('video');
const canvas = document.getElementById('display-canvas');
const ctx = canvas.getContext('2d');
const offscreen = document.getElementById('offscreen');
const offCtx = offscreen.getContext('2d', { willReadFrequently: true });
const filterCanvas = document.getElementById('filterCanvas');
const filterCtx = filterCanvas.getContext('2d', { willReadFrequently: true });
const placeholder = document.getElementById('placeholder');
const videoInput = document.getElementById('videoInput');

// Detection resolution (downscaled for performance)
const DW = 160, DH = 120;
offscreen.width = DW;
offscreen.height = DH;

// ── Utility: activate button in a row ─────────────────────────────────
function activate(btn, ...deactivateIds) {
  if (btn.parentElement) {
    btn.parentElement.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  }
  btn.classList.add('active');
  deactivateIds.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('active');
  });
}

// ── Control Setters ───────────────────────────────────────────────────
function setSpeed(s, btn) { state.speed = s; video.playbackRate = s; activate(btn); }
function setMaxBlobs(v, btn) { state.maxBlobs = v; activate(btn); }
function setShape(s, btn) { state.shape = s; activate(btn); }

function setEffect(e, btn) {
  state.effect = e;
  document.querySelectorAll('.section').forEach(sec => {
    if (sec.querySelector('.section-label')?.textContent === 'Effects') {
      // Only deactivate the first two btn-rows (effect buttons, not filters)
      const rows = sec.querySelectorAll('.btn-row');
      rows[0]?.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
      rows[1]?.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
    }
  });
  btn.classList.add('active');
}

function toggleFilter(f, btn) {
  if (state.filters.has(f)) {
    state.filters.delete(f);
    btn.classList.remove('active');
  } else {
    state.filters.add(f);
    btn.classList.add('active');
  }
}

function setConn(mode, btn) {
  state.connMode = mode;
  document.getElementById('connOff').classList.remove('active');
  document.getElementById('connMesh').classList.remove('active');
  document.getElementById('connHub').classList.remove('active');
  btn.classList.add('active');
}

function setFont(s, btn) { state.fontSize = s; activate(btn); }

function setAudio(mode, btn) { state.audioMode = mode; activate(btn); }

// ── Audio Engine ──────────────────────────────────────────────────────
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playBeep() {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.frequency.value = 800;
  osc.type = 'sine';
  gain.gain.setValueAtTime(0.15, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
  osc.connect(gain).connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 0.1);
}
function playBird() {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.frequency.setValueAtTime(1200, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1800, ctx.currentTime + 0.05);
  osc.frequency.exponentialRampToValueAtTime(1000, ctx.currentTime + 0.15);
  osc.type = 'sine';
  gain.gain.setValueAtTime(0.12, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
  osc.connect(gain).connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 0.2);
}
let lastAudioTime = 0;
function triggerAudio() {
  if (state.audioMode === 'none') return;
  const now = Date.now();
  if (now - lastAudioTime < 300) return;
  lastAudioTime = now;
  if (state.audioMode === 'beep') playBeep();
  else if (state.audioMode === 'bird') playBird();
}

function toggleTheme() {
  document.body.classList.toggle('dark');
  document.body.classList.toggle('light');
}

// ── Video Upload ──────────────────────────────────────────────────────
function uploadVideo() {
  videoInput.click();
}
videoInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  video.srcObject = null;
  video.src = url;
  video.loop = true;
  video.muted = true;
  video.playbackRate = state.speed;
  video.play();
  state.source = 'video';
  state.playing = true;
  startRendering();
});

// ── Camera ────────────────────────────────────────────────────────────
async function openCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 1280, height: 720 }, audio: false
    });
    video.srcObject = stream;
    video.play();
    state.source = 'camera';
    state.playing = true;
    startRendering();
  } catch (err) {
    alert('Camera access denied: ' + err.message);
  }
}

// ── Start Rendering ───────────────────────────────────────────────────
let rendering = false;
function startRendering() {
  placeholder.classList.add('hidden');
  canvas.classList.remove('hidden');
  if (!rendering) {
    rendering = true;
    requestAnimationFrame(renderLoop);
  }
}

// ── Resize canvas to match video ──────────────────────────────────────
function syncCanvasSize() {
  const vw = video.videoWidth || 640;
  const vh = video.videoHeight || 480;
  if (canvas.width !== vw || canvas.height !== vh) {
    canvas.width = vw;
    canvas.height = vh;
    filterCanvas.width = vw;
    filterCanvas.height = vh;
  }
}

// ── Main Render Loop ──────────────────────────────────────────────────
function renderLoop() {
  if (!state.playing) { rendering = false; return; }
  requestAnimationFrame(renderLoop);

  state.frameCount++;
  if (state.frameSkip > 0 && state.frameCount % (state.frameSkip + 1) !== 0) return;

  syncCanvasSize();
  const w = canvas.width, h = canvas.height;

  // Draw video frame
  ctx.drawImage(video, 0, 0, w, h);

  // Detect blobs on downscaled offscreen canvas
  offCtx.drawImage(video, 0, 0, DW, DH);
  const imgData = offCtx.getImageData(0, 0, DW, DH);
  const rawBlobs = detectBlobs(imgData, DW, DH);

  // Scale blobs to display size
  const scaleX = w / DW, scaleY = h / DH;
  let scaledBlobs = rawBlobs.map(b => ({
    x: b.x * scaleX,
    y: b.y * scaleY,
    width: b.width * scaleX,
    height: b.height * scaleY,
    score: b.score
  }));

  // Same size
  if (state.sameSize && scaledBlobs.length > 0) {
    const avgW = scaledBlobs.reduce((s, b) => s + b.width, 0) / scaledBlobs.length;
    const avgH = scaledBlobs.reduce((s, b) => s + b.height, 0) / scaledBlobs.length;
    scaledBlobs.forEach(b => { b.width = avgW; b.height = avgH; });
  }

  // Single tracking: keep only the largest blob
  if (state.singleTracking && scaledBlobs.length > 1) {
    scaledBlobs.sort((a, b) => (b.width * b.height) - (a.width * a.height));
    scaledBlobs = [scaledBlobs[0]];
  }

  // Smooth blobs with lerp + nearest-neighbor matching
  smoothBlobs(scaledBlobs);

  // Apply filter effects
  if (state.filters.size > 0) {
    applyFilters(ctx, w, h);
  }

  // Draw blob overlays
  state.smoothBlobs.forEach((blob, i) => {
    const color = getBlobColor(i);
    drawBlobEffect(ctx, blob, i, color, w, h);
  });

  // Draw connections
  if (state.connMode !== 'off' && state.smoothBlobs.length > 1) {
    drawConnections(ctx, state.smoothBlobs);
  }

  // Draw label text (only if text toggle is on and label field is non-empty)
  if (state.showText && state.labelText.trim()) {
    drawBlobText(ctx, state.smoothBlobs);
  }

  // Trigger audio when blobs detected
  if (state.smoothBlobs.length > 0) {
    triggerAudio();
  }

  state.particlePhase += 0.05;
}

// ── Box blur helper for detection ─────────────────────────────────────
function boxBlur(bright, w, h) {
  const out = new Uint8Array(w * h);
  for (let y = 1; y < h - 1; y++) {
    for (let x = 1; x < w - 1; x++) {
      let sum = 0;
      for (let dy = -1; dy <= 1; dy++) {
        for (let dx = -1; dx <= 1; dx++) {
          sum += bright[(y + dy) * w + (x + dx)];
        }
      }
      out[y * w + x] = sum >= 5 ? 1 : 0; // majority vote
    }
  }
  return out;
}

// ── Blob Detection (brightness threshold + connected components) ──────
function detectBlobs(imgData, w, h) {
  const data = imgData.data;
  const blobs = [];

  // Create brightness map
  let bright = new Uint8Array(w * h);
  for (let i = 0; i < w * h; i++) {
    const idx = i * 4;
    bright[i] = (data[idx] * 0.299 + data[idx + 1] * 0.587 + data[idx + 2] * 0.114) > state.threshold ? 1 : 0;
  }

  // Apply 3x3 box blur (majority vote smoothing) twice for noise reduction
  bright = boxBlur(bright, w, h);
  bright = boxBlur(bright, w, h);

  // Connected components via flood fill
  const visited = new Uint8Array(w * h);
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const pos = y * w + x;
      if (bright[pos] && !visited[pos]) {
        const queue = [pos];
        visited[pos] = 1;
        let minX = x, maxX = x, minY = y, maxY = y;
        let count = 0;
        let totalBright = 0;

        while (queue.length > 0) {
          const p = queue.pop();
          const px = p % w, py = (p / w) | 0;
          count++;
          totalBright += data[p * 4] + data[p * 4 + 1] + data[p * 4 + 2];

          if (px < minX) minX = px;
          if (px > maxX) maxX = px;
          if (py < minY) minY = py;
          if (py > maxY) maxY = py;

          const neighbors = [p - 1, p + 1, p - w, p + w];
          for (const n of neighbors) {
            if (n >= 0 && n < w * h && !visited[n] && bright[n]) {
              visited[n] = 1;
              queue.push(n);
            }
          }
        }

        const bw = maxX - minX + 1;
        const bh = maxY - minY + 1;
        const area = bw * bh;
        // Filter by minimum blob area on detection canvas
        // state.minBlobArea is in display px²; scale down to detection canvas
        const scaleX = (canvas.width || 640) / DW;
        const scaleY = (canvas.height || 480) / DH;
        const minAreaDetect = state.minBlobArea / (scaleX * scaleY);
        if (area >= minAreaDetect && count >= minAreaDetect * 0.3) {
          blobs.push({
            x: minX, y: minY, width: bw, height: bh,
            cx: (minX + maxX) / 2, cy: (minY + maxY) / 2,
            area: area,
            score: Math.min(1, count / area)
          });
        }
      }
    }
  }

  // Sort by area descending
  blobs.sort((a, b) => b.area - a.area);

  // Merge nearby blobs (within 20 display px → scale to detection px)
  const mergeDistDetect = 20 / ((canvas.width || 640) / DW);
  const merged = [];
  const used = new Set();
  for (let i = 0; i < blobs.length; i++) {
    if (used.has(i)) continue;
    let b = { ...blobs[i] };
    for (let j = i + 1; j < blobs.length; j++) {
      if (used.has(j)) continue;
      const dx = b.cx - blobs[j].cx;
      const dy = b.cy - blobs[j].cy;
      if (Math.sqrt(dx * dx + dy * dy) < mergeDistDetect) {
        // Merge: expand bounding box
        const nx = Math.min(b.x, blobs[j].x);
        const ny = Math.min(b.y, blobs[j].y);
        const nx2 = Math.max(b.x + b.width, blobs[j].x + blobs[j].width);
        const ny2 = Math.max(b.y + b.height, blobs[j].y + blobs[j].height);
        b.x = nx; b.y = ny;
        b.width = nx2 - nx; b.height = ny2 - ny;
        b.cx = (nx + nx2) / 2; b.cy = (ny + ny2) / 2;
        b.area = b.width * b.height;
        b.score = Math.max(b.score, blobs[j].score);
        used.add(j);
      }
    }
    merged.push(b);
  }

  // Re-sort merged by area and limit
  merged.sort((a, b) => b.area - a.area);
  return merged.slice(0, state.maxBlobs);
}

// ── Smooth blob tracking (lerp + nearest neighbor matching) ───────────
function smoothBlobs(newBlobs) {
  const lerp = 0.25;  // slower, more stable
  const maxDist = 200;

  if (state.smoothBlobs.length === 0) {
    state.smoothBlobs = newBlobs.map(b => ({ ...b }));
    return;
  }

  const matched = new Set();
  const updated = [];

  for (const nb of newBlobs) {
    let bestIdx = -1, bestDist = Infinity;
    const ncx = nb.x + nb.width / 2, ncy = nb.y + nb.height / 2;

    state.smoothBlobs.forEach((sb, i) => {
      if (matched.has(i)) return;
      const scx = sb.x + sb.width / 2, scy = sb.y + sb.height / 2;
      const d = Math.hypot(ncx - scx, ncy - scy);
      if (d < bestDist) { bestDist = d; bestIdx = i; }
    });

    if (bestIdx >= 0 && bestDist < maxDist) {
      matched.add(bestIdx);
      const sb = state.smoothBlobs[bestIdx];
      updated.push({
        x: sb.x + (nb.x - sb.x) * lerp,
        y: sb.y + (nb.y - sb.y) * lerp,
        width: sb.width + (nb.width - sb.width) * lerp,
        height: sb.height + (nb.height - sb.height) * lerp,
        score: nb.score
      });
    } else {
      updated.push({ ...nb });
    }
  }

  state.smoothBlobs = updated;
}

// ── Get blob color based on settings ──────────────────────────────────
function getBlobColor(index) {
  if (state.crazy) {
    const hue = (Date.now() * 0.5 + index * 60) % 360;
    return `hsl(${hue}, 100%, 60%)`;
  }
  if (state.separateColors) {
    return PALETTE[index % PALETTE.length];
  }
  return state.color;
}

// ── Draw shape path helper ────────────────────────────────────────────
function shapePath(ctx, x, y, w, h) {
  if (state.shape === 'circle') {
    ctx.beginPath();
    ctx.ellipse(x + w / 2, y + h / 2, w / 2, h / 2, 0, 0, Math.PI * 2);
  } else if (state.shape === 'rounded') {
    const r = 12;
    ctx.beginPath();
    if (ctx.roundRect) {
      ctx.roundRect(x, y, w, h, r);
    } else {
      // Fallback for browsers without roundRect
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }
  } else {
    // square — plain rectangle
    ctx.beginPath();
    ctx.rect(x, y, w, h);
  }
}

// ── Draw Blob Effect ──────────────────────────────────────────────────
function drawBlobEffect(ctx, blob, index, color, cw, ch) {
  const { x, y, width: bw, height: bh, score } = blob;
  const cx = x + bw / 2, cy = y + bh / 2;
  ctx.save();
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 2;

  switch (state.effect) {
    case 'basic':
      shapePath(ctx, x, y, bw, bh);
      ctx.stroke();
      break;

    case 'label':
      shapePath(ctx, x, y, bw, bh);
      ctx.stroke();
      ctx.fillStyle = color;
      ctx.fillRect(x, y - 16, bw, 16);
      ctx.fillStyle = '#000';
      ctx.font = 'bold 10px monospace';
      ctx.fillText('OBJ-' + (index + 1), x + 3, y - 4);
      break;

    case 'frame': {
      const corner = Math.min(bw, bh) * 0.3;
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(x, y + corner); ctx.lineTo(x, y); ctx.lineTo(x + corner, y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x + bw - corner, y); ctx.lineTo(x + bw, y); ctx.lineTo(x + bw, y + corner); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x, y + bh - corner); ctx.lineTo(x, y + bh); ctx.lineTo(x + corner, y + bh); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x + bw - corner, y + bh); ctx.lineTo(x + bw, y + bh); ctx.lineTo(x + bw, y + bh - corner); ctx.stroke();
      break;
    }

    case 'lframe': {
      const cl = Math.min(bw, bh) * 0.25;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(x, y + cl); ctx.lineTo(x, y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + cl, y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x + bw, y + cl); ctx.lineTo(x + bw, y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x + bw, y); ctx.lineTo(x + bw - cl, y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x, y + bh - cl); ctx.lineTo(x, y + bh); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x, y + bh); ctx.lineTo(x + cl, y + bh); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x + bw, y + bh - cl); ctx.lineTo(x + bw, y + bh); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x + bw, y + bh); ctx.lineTo(x + bw - cl, y + bh); ctx.stroke();
      break;
    }

    case 'xframe':
      shapePath(ctx, x, y, bw, bh);
      ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + bw, y + bh); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x + bw, y); ctx.lineTo(x, y + bh); ctx.stroke();
      break;

    case 'grid': {
      shapePath(ctx, x, y, bw, bh);
      ctx.stroke();
      ctx.lineWidth = 0.5;
      ctx.globalAlpha = 0.4;
      const gs = Math.max(8, Math.min(bw, bh) / 4);
      for (let gx = x + gs; gx < x + bw; gx += gs) {
        ctx.beginPath(); ctx.moveTo(gx, y); ctx.lineTo(gx, y + bh); ctx.stroke();
      }
      for (let gy = y + gs; gy < y + bh; gy += gs) {
        ctx.beginPath(); ctx.moveTo(x, gy); ctx.lineTo(x + bw, gy); ctx.stroke();
      }
      ctx.globalAlpha = 1;
      break;
    }

    case 'particle': {
      const numP = 8;
      const radius = Math.max(bw, bh) * 0.6;
      for (let i = 0; i < numP; i++) {
        const angle = state.particlePhase + (Math.PI * 2 * i / numP);
        const px = cx + Math.cos(angle) * radius;
        const py = cy + Math.sin(angle) * radius;
        ctx.beginPath();
        ctx.arc(px, py, 3, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI * 2); ctx.fill();
      break;
    }

    case 'dash':
      ctx.setLineDash([6, 4]);
      shapePath(ctx, x, y, bw, bh);
      ctx.stroke();
      ctx.setLineDash([]);
      break;

    case 'scope': {
      const r = Math.max(bw, bh) * 0.5;
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx, cy, r * 0.5, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx - r * 1.2, cy); ctx.lineTo(cx + r * 1.2, cy); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx, cy - r * 1.2); ctx.lineTo(cx, cy + r * 1.2); ctx.stroke();
      for (let i = -1; i <= 1; i += 2) {
        ctx.beginPath(); ctx.moveTo(cx + r * 0.7 * i, cy - 4); ctx.lineTo(cx + r * 0.7 * i, cy + 4); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx - 4, cy + r * 0.7 * i); ctx.lineTo(cx + 4, cy + r * 0.7 * i); ctx.stroke();
      }
      break;
    }

    case 'glow': {
      const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(bw, bh) * 0.8);
      gradient.addColorStop(0, color + '66');
      gradient.addColorStop(0.5, color + '33');
      gradient.addColorStop(1, color + '00');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.ellipse(cx, cy, bw * 0.8, bh * 0.8, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      shapePath(ctx, x, y, bw, bh);
      ctx.stroke();
      break;
    }

    case 'backdrop':
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = color;
      shapePath(ctx, x, y, bw, bh);
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.strokeStyle = color;
      shapePath(ctx, x, y, bw, bh);
      ctx.stroke();
      break;

    case 'win2k': {
      // Retro Windows 2000 dialog box style
      ctx.fillStyle = '#c0c0c0';
      ctx.fillRect(x, y, bw, bh);
      // Title bar
      const barH = 18;
      const grad = ctx.createLinearGradient(x, y, x + bw, y);
      grad.addColorStop(0, '#000080');
      grad.addColorStop(1, '#1084d0');
      ctx.fillStyle = grad;
      ctx.fillRect(x, y, bw, barH);
      // Title text
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(state.labelText.trim() || 'OBJ-' + (index + 1), x + 4, y + 13);
      // Close button
      ctx.fillStyle = '#c0c0c0';
      ctx.fillRect(x + bw - 16, y + 2, 14, 14);
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      ctx.strokeRect(x + bw - 16, y + 2, 14, 14);
      ctx.beginPath();
      ctx.moveTo(x + bw - 13, y + 5); ctx.lineTo(x + bw - 5, y + 13); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x + bw - 5, y + 5); ctx.lineTo(x + bw - 13, y + 13); ctx.stroke();
      // 3D border
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x, y + bh); ctx.lineTo(x, y); ctx.lineTo(x + bw, y); ctx.stroke();
      ctx.strokeStyle = '#808080';
      ctx.beginPath(); ctx.moveTo(x + bw, y); ctx.lineTo(x + bw, y + bh); ctx.lineTo(x, y + bh); ctx.stroke();
      ctx.textAlign = 'center';
      break;
    }

    case 'label2':
      shapePath(ctx, x, y, bw, bh);
      ctx.stroke();
      // Label below box
      ctx.fillStyle = color;
      ctx.font = `bold ${state.fontSize}px monospace`;
      ctx.textAlign = 'center';
      ctx.fillText(state.labelText.trim() || 'OBJ-' + (index + 1), cx, y + bh + state.fontSize + 4);
      break;
  }

  ctx.restore();
}

// ── Filter Effects (post-processing) ──────────────────────────────────
function applyFilters(ctx, w, h) {
  const imageData = ctx.getImageData(0, 0, w, h);
  const data = imageData.data;
  const len = data.length;

  for (const filter of state.filters) {
    switch (filter) {
      case 'invert':
        for (let i = 0; i < len; i += 4) {
          data[i] = 255 - data[i];
          data[i + 1] = 255 - data[i + 1];
          data[i + 2] = 255 - data[i + 2];
        }
        break;

      case 'thermal':
        for (let i = 0; i < len; i += 4) {
          const v = (data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114);
          if (v < 85) {
            data[i] = 0; data[i + 1] = 0; data[i + 2] = v * 3;
          } else if (v < 170) {
            data[i] = (v - 85) * 3; data[i + 1] = 0; data[i + 2] = 255 - (v - 85) * 3;
          } else {
            data[i] = 255; data[i + 1] = (v - 170) * 3; data[i + 2] = 0;
          }
        }
        break;

      case 'pixel': {
        const ps = 8;
        for (let py = 0; py < h; py += ps) {
          for (let px = 0; px < w; px += ps) {
            const idx = (py * w + px) * 4;
            const r = data[idx], g = data[idx + 1], b = data[idx + 2];
            for (let dy = 0; dy < ps && py + dy < h; dy++) {
              for (let dx = 0; dx < ps && px + dx < w; dx++) {
                const i = ((py + dy) * w + (px + dx)) * 4;
                data[i] = r; data[i + 1] = g; data[i + 2] = b;
              }
            }
          }
        }
        break;
      }

      case 'tone':
        for (let i = 0; i < len; i += 4) {
          const r = data[i], g = data[i + 1], b = data[i + 2];
          data[i] = Math.min(255, r * 0.393 + g * 0.769 + b * 0.189);
          data[i + 1] = Math.min(255, r * 0.349 + g * 0.686 + b * 0.168);
          data[i + 2] = Math.min(255, r * 0.272 + g * 0.534 + b * 0.131);
        }
        break;

      case 'dither': {
        const bayer = [
          [0, 8, 2, 10], [12, 4, 14, 6],
          [3, 11, 1, 9], [15, 7, 13, 5]
        ];
        for (let py = 0; py < h; py++) {
          for (let px = 0; px < w; px++) {
            const i = (py * w + px) * 4;
            const threshold = (bayer[py % 4][px % 4] / 16) * 255;
            for (let c = 0; c < 3; c++) {
              data[i + c] = data[i + c] > threshold ? 255 : 0;
            }
          }
        }
        break;
      }

      case 'edge': {
        const copy = new Uint8ClampedArray(data);
        for (let py = 1; py < h - 1; py++) {
          for (let px = 1; px < w - 1; px++) {
            const i = (py * w + px) * 4;
            for (let c = 0; c < 3; c++) {
              const tl = copy[((py-1)*w+(px-1))*4+c];
              const t  = copy[((py-1)*w+px)*4+c];
              const tr = copy[((py-1)*w+(px+1))*4+c];
              const l  = copy[(py*w+(px-1))*4+c];
              const r  = copy[(py*w+(px+1))*4+c];
              const bl = copy[((py+1)*w+(px-1))*4+c];
              const b  = copy[((py+1)*w+px)*4+c];
              const br = copy[((py+1)*w+(px+1))*4+c];
              const gx = -tl - 2*l - bl + tr + 2*r + br;
              const gy = -tl - 2*t - tr + bl + 2*b + br;
              data[i + c] = Math.min(255, Math.sqrt(gx * gx + gy * gy));
            }
          }
        }
        break;
      }

      case 'xray':
        for (let i = 0; i < len; i += 4) {
          const v = (data[i] + data[i + 1] + data[i + 2]) / 3;
          const inv = 255 - v;
          const c = inv < 128 ? inv * inv / 128 : 255 - (255 - inv) * (255 - inv) / 128;
          data[i] = c; data[i + 1] = c; data[i + 2] = c + 30;
        }
        break;

      case 'fusion':
        for (let i = 0; i < len; i += 4) {
          const r = data[i], g = data[i + 1], b = data[i + 2];
          data[i] = Math.min(255, r * 1.2 + g * 0.1);
          data[i + 1] = Math.min(255, g * 0.8 + b * 0.3);
          data[i + 2] = Math.min(255, b * 1.3 + r * 0.1);
        }
        break;

      case 'mask':
        if (state.smoothBlobs.length > 0) {
          for (let py = 0; py < h; py++) {
            for (let px = 0; px < w; px++) {
              let inBlob = false;
              for (const b of state.smoothBlobs) {
                if (px >= b.x && px <= b.x + b.width && py >= b.y && py <= b.y + b.height) {
                  inBlob = true; break;
                }
              }
              if (!inBlob) {
                const i = (py * w + px) * 4;
                data[i] *= 0.2;
                data[i + 1] *= 0.2;
                data[i + 2] *= 0.2;
              }
            }
          }
        }
        break;

      case 'blink':
        if (Math.sin(Date.now() * 0.01) > 0.5) {
          for (let i = 0; i < len; i += 4) {
            data[i] = Math.min(255, data[i] + 80);
            data[i + 1] = Math.min(255, data[i + 1] + 80);
            data[i + 2] = Math.min(255, data[i + 2] + 80);
          }
        }
        break;

      case 'inv':
        // Partial inversion — invert R and B, keep G
        for (let i = 0; i < len; i += 4) {
          data[i] = 255 - data[i];
          data[i + 2] = 255 - data[i + 2];
        }
        break;
    }
  }

  ctx.putImageData(imageData, 0, 0);

  // Canvas API filters applied on top
  for (const filter of state.filters) {
    switch (filter) {
      case 'blur':
        filterCtx.clearRect(0, 0, w, h);
        filterCtx.filter = 'blur(3px)';
        filterCtx.drawImage(canvas, 0, 0);
        filterCtx.filter = 'none';
        ctx.drawImage(filterCanvas, 0, 0);
        break;

      case 'glitch': {
        const numSlices = 10 + Math.random() * 10;
        for (let i = 0; i < numSlices; i++) {
          const sliceY = Math.random() * h;
          const sliceH = 2 + Math.random() * 15;
          const offset = (Math.random() - 0.5) * 30;
          ctx.drawImage(canvas, 0, sliceY, w, sliceH, offset, sliceY, w, sliceH);
        }
        break;
      }

      case 'zoom': {
        const zf = 1 + 0.03 * Math.sin(Date.now() * 0.005);
        filterCtx.clearRect(0, 0, w, h);
        filterCtx.drawImage(canvas, 0, 0);
        ctx.clearRect(0, 0, w, h);
        const dx = w * (1 - zf) / 2, dy = h * (1 - zf) / 2;
        ctx.drawImage(filterCanvas, dx, dy, w * zf, h * zf);
        break;
      }

      case 'water': {
        const t = Date.now() * 0.003;
        filterCtx.clearRect(0, 0, w, h);
        filterCtx.drawImage(canvas, 0, 0);
        const stripH = 4;
        for (let sy = 0; sy < h; sy += stripH) {
          const dx = Math.sin(sy * 0.02 + t) * 6;
          ctx.drawImage(filterCanvas, 0, sy, w, stripH, dx, sy, w, stripH);
        }
        break;
      }

      case 'crt': {
        ctx.fillStyle = 'rgba(0,0,0,0.08)';
        for (let sy = 0; sy < h; sy += 3) {
          ctx.fillRect(0, sy, w, 1);
        }
        const vg = ctx.createRadialGradient(w / 2, h / 2, w * 0.3, w / 2, h / 2, w * 0.8);
        vg.addColorStop(0, 'rgba(0,0,0,0)');
        vg.addColorStop(1, 'rgba(0,0,0,0.4)');
        ctx.fillStyle = vg;
        ctx.fillRect(0, 0, w, h);
        break;
      }
    }
  }
}

// ── Draw Connections ──────────────────────────────────────────────────
function drawConnections(ctx, blobs) {
  ctx.save();
  ctx.strokeStyle = state.color;
  ctx.lineWidth = state.connWidth;
  if (state.connDash) ctx.setLineDash([5, 5]);

  if (state.connMode === 'mesh') {
    for (let i = 0; i < blobs.length; i++) {
      for (let j = i + 1; j < blobs.length; j++) {
        if (Math.random() > state.connRate) continue;
        const a = blobs[i], b = blobs[j];
        const ax = a.x + a.width / 2, ay = a.y + a.height / 2;
        const bx = b.x + b.width / 2, by = b.y + b.height / 2;
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(bx, by);
        ctx.stroke();
      }
    }
  } else if (state.connMode === 'hub') {
    const hub = blobs[0];
    const hx = hub.x + hub.width / 2, hy = hub.y + hub.height / 2;
    for (let i = 1; i < blobs.length; i++) {
      if (Math.random() > state.connRate) continue;
      const b = blobs[i];
      ctx.beginPath();
      ctx.moveTo(hx, hy);
      ctx.lineTo(b.x + b.width / 2, b.y + b.height / 2);
      ctx.stroke();
    }
  }

  ctx.setLineDash([]);
  ctx.restore();
}

// ── Draw Text on Blobs ────────────────────────────────────────────────
function drawBlobText(ctx, blobs) {
  ctx.save();
  ctx.font = `bold ${state.fontSize}px monospace`;
  ctx.fillStyle = state.color;
  ctx.textAlign = 'center';

  blobs.forEach((b, i) => {
    const text = state.labelText.trim();
    if (!text) return;

    const cx = b.x + b.width / 2;
    let ty;
    switch (state.textPosition) {
      case 'top': ty = b.y - 6; break;
      case 'bottom': ty = b.y + b.height + state.fontSize + 2; break;
      default: ty = b.y + b.height / 2 + state.fontSize / 3; break;
    }

    if (state.separateColors) ctx.fillStyle = PALETTE[i % PALETTE.length];
    if (state.crazy) {
      const hue = (Date.now() * 0.5 + i * 60) % 360;
      ctx.fillStyle = `hsl(${hue}, 100%, 60%)`;
    }
    ctx.fillText(text, cx, ty);
  });

  ctx.restore();
}

// ── Export Video ───────────────────────────────────────────────────────
function exportVideo(format) {
  if (state.recording) {
    state.recorder.stop();
    state.recording = false;
    return;
  }

  const mimeType = format === 'mp4'
    ? (MediaRecorder.isTypeSupported('video/mp4;codecs=avc1') ? 'video/mp4;codecs=avc1' : 'video/webm;codecs=vp9')
    : 'video/webm;codecs=vp9';

  const hq = document.getElementById('hqExport').checked;
  const bitrate = hq ? 8000000 : 2500000;

  const stream = canvas.captureStream(30);
  const recorder = new MediaRecorder(stream, {
    mimeType: MediaRecorder.isTypeSupported(mimeType) ? mimeType : 'video/webm',
    videoBitsPerSecond: bitrate
  });

  const chunks = [];
  recorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: recorder.mimeType });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `trackr-export.${format === 'mp4' && recorder.mimeType.includes('mp4') ? 'mp4' : 'webm'}`;
    a.click();
    URL.revokeObjectURL(url);
  };

  recorder.start();
  state.recorder = recorder;
  state.recording = true;

  if (state.source === 'video' && video.duration && isFinite(video.duration)) {
    setTimeout(() => {
      if (state.recording) {
        recorder.stop();
        state.recording = false;
      }
    }, video.duration * 1000 / state.speed);
  }
}

// ── Init ──────────────────────────────────────────────────────────────
document.getElementById('connOff').classList.add('active');
</script>
